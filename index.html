<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小窩藏館 - 數位收藏管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFCFE;
            color: #4A447F;
        }

        .glass-gradient {
            background: linear-gradient(135deg, #B2A4FF 0%, #C9BFFF 50%, #EBE7FF 100%);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(178, 164, 255, 0.2);
        }

        .transition-all-500 {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 隱藏原生檔案上傳按鈕 */
        #file-input {
            display: none;
        }
    </style>
</head>
<body class="selection:bg-[#B2A4FF]/20">

    <div class="flex min-h-screen">
        <!-- 側邊導航欄 -->
        <aside class="w-72 bg-[#F6F4FF] border-r border-[#EBE7FF] hidden lg:flex flex-col fixed h-full">
            <div class="p-10">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-[1.25rem] bg-[#B2A4FF] flex items-center justify-center shadow-lg shadow-indigo-100 rotate-3">
                        <i class="fas fa-book-open text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-black text-xl tracking-tighter text-[#4A447F]">小窩藏館</h1>
                        <p class="text-[10px] font-bold text-[#A69DCC] uppercase tracking-widest">My Vault v5.2</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-6 space-y-4">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-6 py-4 rounded-[1.25rem] transition-all font-black text-sm bg-white text-[#B2A4FF] shadow-sm">
                    <i class="fas fa-home w-5"></i> 控制台
                </button>
                <button onclick="switchTab('collection')" id="nav-collection" class="w-full flex items-center gap-4 px-6 py-4 rounded-[1.25rem] transition-all font-black text-sm text-[#A69DCC] hover:bg-white hover:text-[#B2A4FF]">
                    <i class="fas fa-th-large w-5"></i> 珍藏藝廊
                </button>
                <button onclick="switchTab('wishlist')" id="nav-wishlist" class="w-full flex items-center gap-4 px-6 py-4 rounded-[1.25rem] transition-all font-black text-sm text-[#A69DCC] hover:bg-white hover:text-[#B2A4FF]">
                    <i class="fas fa-heart w-5"></i> 心願清單
                </button>
            </nav>

            <div class="p-8" id="auth-section">
                <!-- 登入前 -->
                <button id="btn-login" onclick="loginWithGoogle()" class="w-full py-4 bg-[#B2A4FF] text-white rounded-[1.25rem] font-black text-sm shadow-lg shadow-indigo-100 hover:bg-[#9988FF] transition-all">
                    <i class="fab fa-google mr-2"></i> Google 登入
                </button>
                <!-- 登入後內容將由 JS 動態顯示 -->
            </div>
        </aside>

        <!-- 主要內容區 -->
        <main class="flex-1 ml-0 lg:ml-72 flex flex-col h-screen overflow-hidden">
            <header class="h-24 bg-white/50 backdrop-blur-xl flex items-center px-10 justify-between sticky top-0 z-20">
                <div>
                    <h2 id="current-tab-title" class="font-black text-2xl text-[#4A447F] tracking-tight">數據中心</h2>
                    <p id="user-greeting" class="text-xs text-[#A69DCC] font-bold">歡迎使用，請先登入以同步您的收藏。</p>
                </div>
                <div id="user-profile" class="hidden flex items-center gap-4 bg-white p-2 pr-5 rounded-2xl border border-[#F0EDFF] shadow-sm">
                    <img id="user-avatar" src="" class="w-10 h-10 rounded-xl bg-gray-200" alt="Avatar">
                    <div>
                        <p id="user-name" class="text-xs font-black text-[#4A447F]">未登入</p>
                        <p class="text-[10px] font-bold text-green-400">在線</p>
                    </div>
                </div>
            </header>

            <div id="content-area" class="flex-1 overflow-y-auto p-6 lg:p-10 pb-20">
                <!-- Dashboard Content (Default) -->
                <div id="tab-dashboard" class="space-y-8 animate-in fade-in duration-700">
                    <div class="relative overflow-hidden glass-gradient p-8 sm:p-10 rounded-[3rem] shadow-2xl shadow-indigo-100 text-white">
                        <div class="relative z-10">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                <div>
                                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-white/20 backdrop-blur-md rounded-full border border-white/30 text-xs font-bold mb-4">
                                        <i class="fas fa-bolt text-yellow-300"></i> <span>即時概況</span>
                                    </div>
                                    <h2 class="text-3xl sm:text-4xl font-black tracking-tight mb-2">你的珍藏宇宙</h2>
                                    <p class="text-white/80 font-medium max-w-md">登入後即可查看您的專屬數據與市值統計。</p>
                                </div>
                                <div class="flex gap-4">
                                    <div class="px-6 py-4 bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl text-center min-w-[100px]">
                                        <p class="text-[10px] font-bold text-white/60 uppercase">藏品總數</p>
                                        <p id="stat-total" class="text-2xl font-black">0</p>
                                    </div>
                                    <div class="px-6 py-4 bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl text-center min-w-[100px]">
                                        <p class="text-[10px] font-bold text-white/60 uppercase">預計市值</p>
                                        <p id="stat-value" class="text-2xl font-black">$0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 最近收藏 -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-6">
                            <h3 class="text-lg font-bold text-[#4A447F] flex items-center gap-2">
                                <i class="fas fa-star text-[#B2A4FF]"></i> 最近加入的藏品
                            </h3>
                            <div id="recent-items-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <!-- 動態載入 -->
                            </div>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-white p-8 rounded-[3rem] border border-[#F0EDFF] shadow-sm">
                                <h3 class="text-lg font-bold text-[#4A447F] mb-6 flex items-center gap-2">
                                    <i class="fas fa-shopping-bag text-rose-400"></i> 新增收藏
                                </h3>
                                <div class="space-y-4">
                                    <input type="text" id="new-item-name" placeholder="藏品名稱" class="w-full px-4 py-3 rounded-xl bg-[#F6F4FF] border-none text-sm outline-none">
                                    <select id="new-item-type" class="w-full px-4 py-3 rounded-xl bg-[#F6F4FF] border-none text-sm outline-none">
                                        <option value="novel">經典小說</option>
                                        <option value="merch">週邊商品</option>
                                    </select>
                                    <div class="flex gap-2">
                                        <input type="number" id="new-item-price" placeholder="價格" class="flex-1 px-4 py-3 rounded-xl bg-[#F6F4FF] border-none text-sm outline-none">
                                        <label for="file-input" class="px-4 py-3 bg-[#EBE7FF] text-[#B2A4FF] rounded-xl cursor-pointer hover:bg-[#DED9FF] transition-all">
                                            <i class="fas fa-camera"></i>
                                        </label>
                                        <input type="file" id="file-input" accept="image/*">
                                    </div>
                                    <button onclick="handleUpload()" class="w-full py-3 bg-[#B2A4FF] text-white rounded-xl font-bold hover:bg-[#9988FF] transition-all">上傳收藏</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Gallery Content (Hidden by default) -->
                <div id="tab-collection" class="hidden space-y-6">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                        <div class="flex items-center gap-3 bg-white px-6 py-4 rounded-2xl border border-[#EEEBFF] w-full md:max-w-md shadow-sm">
                            <i class="fas fa-search text-[#B2A4FF]"></i>
                            <input type="text" placeholder="搜尋藏品..." class="bg-transparent border-none outline-none text-sm w-full">
                        </div>
                    </div>
                    <div id="gallery-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        <!-- 動態載入 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyB5fqeQRhXBD96sj1HUEfquEmLTtDxZGAQ",
            authDomain: "yutungcc66.firebaseapp.com",
            projectId: "yutungcc66",
            storageBucket: "yutungcc66.firebasestorage.app",
            messagingSenderId: "922962227640",
            appId: "1:922962227640:web:70376013869198b982df4d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let base64Image = null;

        // --- 核心功能: 登入 ---
        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("登入失敗: " + error.message);
            }
        };

        window.logout = async () => {
            await signOut(auth);
            location.reload();
        };

        // --- 核心功能: 切換頁面 ---
        window.switchTab = (tabId) => {
            document.getElementById('tab-dashboard').classList.add('hidden');
            document.getElementById('tab-collection').classList.add('hidden');
            document.getElementById('tab-' + tabId).classList.remove('hidden');

            // 更新按鈕樣式
            ['dashboard', 'collection', 'wishlist'].forEach(id => {
                const navBtn = document.getElementById('nav-' + id);
                if (navBtn) {
                    navBtn.classList.remove('bg-white', 'text-[#B2A4FF]', 'shadow-sm');
                    navBtn.classList.add('text-[#A69DCC]');
                }
            });
            document.getElementById('nav-' + tabId).classList.add('bg-white', 'text-[#B2A4FF]', 'shadow-sm');
            document.getElementById('current-tab-title').innerText = tabId === 'dashboard' ? '數據中心' : '我的珍藏';
        };

        // --- 核心功能: 監聽資料庫 ---
        const listenToCollection = (user) => {
            const q = query(
                collection(db, "collections"), 
                where("userId", "==", user.uid)
            );

            onSnapshot(q, (snapshot) => {
                const items = [];
                let totalValue = 0;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    items.push({ id: doc.id, ...data });
                    totalValue += Number(data.price || 0);
                });

                updateUI(items, totalValue);
            });
        };

        const updateUI = (items, totalValue) => {
            // 更新統計數據
            document.getElementById('stat-total').innerText = items.length;
            document.getElementById('stat-value').innerText = `$${totalValue.toLocaleString()}`;

            // 更新畫廊
            const galleryGrid = document.getElementById('gallery-grid');
            const recentList = document.getElementById('recent-items-list');
            galleryGrid.innerHTML = '';
            recentList.innerHTML = '';

            items.forEach(item => {
                const cardHtml = `
                    <div class="group bg-white rounded-[2rem] overflow-hidden border border-[#F0EDFF] hover:border-[#B2A4FF] transition-all-500 card-hover">
                        <div class="aspect-[3/4] relative overflow-hidden bg-[#F6F4FF]">
                            <img src="${item.image || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover">
                            <div class="absolute top-4 left-4">
                                <span class="text-[10px] font-black uppercase px-3 py-1.5 rounded-xl shadow-lg bg-[#B2A4FF]/90 text-white">
                                    ${item.type === 'novel' ? '小說' : '週邊'}
                                </span>
                            </div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-black text-[#4A447F] text-sm truncate mb-2">${item.name}</h3>
                            <p class="text-xs font-black text-[#B2A4FF]">$${Number(item.price).toLocaleString()}</p>
                        </div>
                    </div>
                `;
                galleryGrid.innerHTML += cardHtml;
            });

            // 最近收藏 (取前 4 個)
            items.slice(0, 4).forEach(item => {
                const rowHtml = `
                    <div class="flex items-center gap-4 p-5 rounded-[2rem] bg-white border border-[#F0EDFF] hover:shadow-xl transition-all group">
                        <img src="${item.image}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1">
                            <h4 class="text-sm font-black text-[#504A8E]">${item.name}</h4>
                            <span class="text-[9px] font-bold bg-[#F6F4FF] text-[#B2A4FF] px-2 py-0.5 rounded-full uppercase">${item.type}</span>
                        </div>
                        <i class="fas fa-chevron-right text-[#DED9FF]"></i>
                    </div>
                `;
                recentList.innerHTML += rowHtml;
            });
        };

        // --- 核心功能: 圖片轉 Base64 ---
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                base64Image = reader.result;
                alert("圖片準備就緒！");
            };
            reader.readAsDataURL(file);
        });

        // --- 核心功能: 上傳資料 ---
        window.handleUpload = async () => {
            if (!currentUser) return alert("請先登入！");
            
            const name = document.getElementById('new-item-name').value;
            const type = document.getElementById('new-item-type').value;
            const price = document.getElementById('new-item-price').value;

            if (!name || !price || !base64Image) return alert("請填寫完整資訊並選擇圖片");

            try {
                await addDoc(collection(db, "collections"), {
                    name,
                    type,
                    price: Number(price),
                    image: base64Image,
                    userId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
                // 清空欄位
                document.getElementById('new-item-name').value = '';
                document.getElementById('new-item-price').value = '';
                base64Image = null;
                alert("收藏成功！");
            } catch (e) {
                alert("上傳失敗: " + e.message);
            }
        };

        // 監聽 Auth 狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-greeting').innerText = `哈囉 ${user.displayName.split(' ')[0]}，今天也要好好愛護收藏喔！`;
                document.getElementById('auth-section').innerHTML = `
                    <button onclick="logout()" class="w-full py-4 bg-white text-rose-400 border border-rose-100 rounded-[1.25rem] font-black text-sm hover:bg-rose-50 transition-all">
                        登出帳號
                    </button>
                `;
                listenToCollection(user);
            }
        });
    </script>
</body>
</html>
